<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Daniel's Library</title>
</head>

<body>

    <button command="show-modal" commandfor="my-dialog">Add book</button>

    <dialog id="my-dialog">
        <form action="" method="">
            <p>Required fields (*)</p>
            <p>
                <label for="name">Book's name *</label>
                <input type="text" id="name" name="name" required>
            </p>
            <p>
                <label for="author">Book's author *</label>
                <input type="text" id="author" name="author" required>
            </p>
            <p>
                <label for="pages">Pages *</label>
                <input type="number" id="pages" name="pages" required>
            </p>
            <p>
                <label for="read">Read? *</label>
                <input type="checkbox" id="read" name="read" required>
            </p>
            <button type="submit">Submit book</button>
        </form>
        <button commandfor="my-dialog" command="close">Close</button>
    </dialog>

    <script src="script.js"></script>
</body>

</html>
